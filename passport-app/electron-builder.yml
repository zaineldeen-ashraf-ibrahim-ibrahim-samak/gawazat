# Electron Builder Configuration for Windows x64 NSIS
# Code signing is configured separately by the deploy team for production builds.
# Development builds will not be signed.
#
# Branding is controlled via .env:
#   APP_NAME  → productName (Arabic)
#   APP_ID    → appId
#   APP_ICON  → win.icon

appId: ${env.APP_ID}
productName: ${env.APP_NAME}
directories:
  output: dist
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: ${env.APP_ICON}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ar
    - en
  perMachine: false
files:
  - src/**
  - renderer/**
  - package.json
  - package-lock.json
  - .env
